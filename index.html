<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>げんそ発見ラボ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #f7f2e6;
  --paper: #fffaf0;
  --ink: #23324a;
  --ink-soft: #5a6b85;
  --teal: #2f9e8f;
  --teal-dark: #227568;
  --coral: #ff8c69;
  --coral-dark: #e06a48;
  --gold: #e8b23d;
  --line: #e4dcc8;
  --font-display: 'Yomogi', sans-serif;
  --font-ui: 'Zen Maru Gothic', sans-serif;
}
*{ box-sizing:border-box; }
html{ height:100%; }
body{
  margin:0; font-family: var(--font-ui); background: var(--bg); color: var(--ink);
  min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
  padding: clamp(16px,2.5vw,40px) 12px 60px;
  background-image: radial-gradient(circle at 20px 20px, rgba(47,158,143,0.06) 2px, transparent 2px);
  background-size: 26px 26px;
}
#app{ width:100%; max-width: min(760px, 96vw); }
.card{
  background: var(--paper);
  border-radius: 20px;
  border: 2px solid var(--line);
  padding: clamp(20px,3vw,34px) clamp(16px,3vw,30px);
  box-shadow: 0 14px 34px rgba(35,50,74,0.1);
  margin-bottom: 14px;
}
h1.title{
  font-family: var(--font-display);
  font-size: clamp(30px, 4.6vw, 46px); text-align:center; margin: 4px 0 2px; color: var(--teal-dark);
}
.subtitle{ text-align:center; color: var(--ink-soft); font-size: clamp(13px,1.6vw,17px); margin: 0 0 18px; }
.lab-emoji{ text-align:center; font-size: clamp(40px,6vw,64px); margin-bottom:4px; }

button{ font-family: var(--font-ui); cursor:pointer; border:none; }
.mode-btn{
  display:flex; align-items:center; gap:14px; width:100%;
  background: #fff; border: 2px solid var(--line); border-radius:16px;
  padding: clamp(14px,1.8vw,20px) clamp(16px,2vw,22px); margin-bottom:12px; text-align:left;
  transition: transform .08s, border-color .15s;
}
.mode-btn:active{ transform: scale(0.98); }
.mode-btn .emo{ font-size: clamp(28px,3.2vw,38px); }
.mode-btn .txt b{ display:block; font-size: clamp(15.5px,1.9vw,20px); color: var(--ink); }
.mode-btn .txt span{ font-size: clamp(11.5px,1.4vw,14.5px); color: var(--ink-soft); }
.mode-btn.teal{ border-color: var(--teal); }
.mode-btn.coral{ border-color: var(--coral); }
.mode-btn.gold{ border-color: var(--gold); }

.progress-chip{
  display:flex; align-items:center; justify-content:center; gap:8px;
  background: #eef6f2; border-radius: 999px; padding: 10px 18px; margin: 0 auto 18px;
  width:fit-content; font-size: clamp(13px,1.5vw,16px); color: var(--teal-dark); font-weight:700;
}

/* ---------- periodic dex grid ---------- */
.dex-wrap{ overflow-x:auto; padding-bottom:6px; }
.dex-grid{
  display:grid;
  grid-template-columns: repeat(18, minmax(24px,1fr));
  grid-auto-rows: minmax(22px, auto);
  gap: clamp(3px,0.4vw,6px);
  min-width: 560px;
  width:100%;
}
.cell{
  aspect-ratio: 1/1;
  border-radius: 5px;
  display:flex; align-items:center; justify-content:center;
  font-size: clamp(10.5px,1.1vw,14px); font-weight:900; color: #fff;
  position:relative; cursor:pointer;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,0.12);
}
.cell.locked{
  background: #dfe3ea; color: #a9b1c0; cursor:pointer;
  box-shadow: none;
}
.cell.locked::after{ content:'?'; }
.cell.future{
  background: repeating-linear-gradient(45deg, #eceff3, #eceff3 4px, #e3e7ed 4px, #e3e7ed 8px);
  color:#c3cad4;
}
.cell.selected{ outline: 3px solid var(--ink); outline-offset:1px; }

.detail-panel{
  margin-top:14px; padding: clamp(14px,1.8vw,20px); border-radius:14px;
  background: #eef6f2; border: 2px dashed var(--teal);
  display:flex; gap:14px; align-items:center;
}
.detail-panel.future{ background:#f2f2f2; border-color:#c3cad4; }
.detail-panel .demo{ font-size: clamp(34px,4vw,46px); }
.detail-panel .txt b{ font-family: var(--font-display); font-size: clamp(20px,2.4vw,26px); color:var(--teal-dark); display:block; }
.detail-panel .txt .yomi{ font-size: clamp(12px,1.4vw,15px); color: var(--ink-soft); }
.detail-panel .txt .fact{ font-size: clamp(12px,1.4vw,15px); color: var(--ink); margin-top:4px; }
.detail-empty{ text-align:center; color: var(--ink-soft); font-size: clamp(12.5px,1.4vw,15px); padding: 16px 0; }

.legend{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; font-size: clamp(10px,1.1vw,12.5px); color: var(--ink-soft); }
.legend span{ display:inline-flex; align-items:center; gap:4px; }
.legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; }

.periodic-info{
  background:#fff6e0; border: 2px dashed var(--gold); border-radius:14px;
  padding: 14px 16px; margin: 10px 0 16px; font-size: clamp(12.5px,1.4vw,15px); color: var(--ink);
}
.periodic-info .info-title{ font-family: var(--font-display); font-size: clamp(16px,1.9vw,19px); color: var(--teal-dark); margin-bottom:6px; }
.periodic-info .info-line{ margin: 4px 0; line-height:1.6; }

/* ---------- quiz ---------- */
.quiz-top{ display:flex; justify-content:space-between; font-size: clamp(12px,1.3vw,15px); color: var(--ink-soft); margin-bottom:10px; }
.prompt-box{
  background: linear-gradient(180deg, #fff, #fbf6e8);
  border: 2px solid var(--line); border-radius:16px;
  padding: clamp(26px,3.4vw,42px) 14px; text-align:center; margin-bottom:18px;
  position:relative;
}
.prompt-emoji{ font-size: clamp(52px,7vw,82px); margin-bottom:8px; }
.prompt-symbol{ font-family: var(--font-display); font-size: clamp(56px,7.5vw,88px); color: var(--teal-dark); }
.prompt-clue{ font-size: clamp(15px,1.9vw,20px); color: var(--ink); margin-top:4px; line-height:1.5; }

.choices{ display:grid; grid-template-columns: 1fr 1fr; gap: clamp(10px,1.3vw,16px); }
.choice-btn{
  background:#fff; border: 2px solid var(--line); border-radius:14px;
  padding: clamp(12px,1.6vw,18px) 6px; text-align:center; transition: transform .08s;
}
.choice-btn:active{ transform: scale(0.97); }
.choice-btn .csym{ font-family: var(--font-display); font-size: clamp(22px,2.6vw,30px); color: var(--ink); display:block; }
.choice-btn .cname{ font-size: clamp(12.5px,1.5vw,16px); color: var(--ink-soft); display:block; margin-top:2px; }
.choice-btn.correct{ background:#e4f7ec; border-color:#63c98a; }
.choice-btn.wrong{ background:#fde8e4; border-color:#ef8a72; }
.choice-btn:disabled{ opacity:0.85; }

.fact-reveal{
  margin-top:14px; padding: clamp(12px,1.6vw,18px) clamp(14px,1.8vw,20px); border-radius:12px; background:#fff6e0;
  border: 2px dashed var(--gold); font-size: clamp(13px,1.6vw,16px); color: var(--ink); display:none;
}
.fact-reveal.show{ display:block; }
.fact-reveal.wrongbox{ background:#fdeee9; border-color: var(--coral); }

.btn-primary{
  display:block; width:100%; margin-top:14px;
  background: linear-gradient(180deg, #3db3a2, var(--teal-dark)); color:#fff;
  font-weight:900; font-size: clamp(16px,1.9vw,20px); padding: clamp(14px,1.8vw,18px) 0; border-radius:14px;
  box-shadow: 0 5px 0 #1c5f54;
}
.btn-primary:active{ transform: translateY(3px); box-shadow:none; }
.btn-ghost{
  display:block; width:100%; margin-top:10px; background:transparent;
  border: 1.5px solid var(--line); color: var(--ink-soft); border-radius:12px;
  padding: clamp(10px,1.3vw,14px) 0; font-size: clamp(13px,1.5vw,16px); font-weight:700;
}
.streak{ font-weight:700; color: var(--coral-dark); }

/* ---------- compound quiz ---------- */
.combo-row{ display:flex; align-items:center; justify-content:center; gap: clamp(10px,1.3vw,16px); flex-wrap:wrap; }
.combo-chip{
  background:#fff; border:2px solid var(--line); border-radius:14px;
  padding: clamp(10px,1.4vw,16px) clamp(14px,1.8vw,20px); text-align:center; min-width:76px;
}
.combo-chip .ce{ font-size: clamp(26px,3.2vw,36px); display:block; }
.combo-chip .cs{ font-family: var(--font-display); font-size: clamp(20px,2.4vw,26px); color: var(--teal-dark); display:block; }
.combo-chip .cn{ font-size: clamp(10.5px,1.2vw,13px); color: var(--ink-soft); }
.combo-op{ font-family: var(--font-display); font-size: clamp(26px,3vw,34px); color: var(--ink-soft); }

.combo-dex{ display:flex; flex-wrap:wrap; gap: clamp(6px,0.8vw,10px); margin-top:4px; }
.combo-cell{
  width: clamp(44px,5vw,56px); height: clamp(44px,5vw,56px); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size: clamp(20px,2.4vw,26px); cursor:pointer;
  background:#dfe3ea; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.12);
}
.combo-cell.locked{ color:#a9b1c0; }

/* ---------- tier progress & rarity ---------- */
.tier-row{ display:flex; gap:6px; justify-content:center; margin: 0 0 16px; flex-wrap:wrap; }
.tier-chip{
  font-size: clamp(10.5px,1.2vw,13px); font-weight:700; padding:6px 11px; border-radius:999px;
  color:#fff;
}
.tier-chip.common{ background:#8fa3ad; }
.tier-chip.uncommon{ background:#63c98a; }
.tier-chip.rare{ background:#4f9dd6; }
.tier-chip.doubleRare{ background: linear-gradient(120deg,#7bd6c4,#4f9dd6); }
.tier-chip.tripleRare{ background: linear-gradient(120deg,#f2a6c9,#a98fd6); }
.tier-chip.superRare{ background: linear-gradient(120deg,#f2ce7c,#f28fa3); }
.tier-chip.hyperRare{ background: linear-gradient(120deg,#f2ce7c,#7bd6c4); box-shadow: 0 0 8px rgba(242,206,124,0.5); }
.tier-chip.ultraRare{ background: linear-gradient(120deg,#a98fd6,#4f9dd6); box-shadow: 0 0 10px rgba(169,143,214,0.6); }
.tier-chip.hundred{ background: linear-gradient(120deg,#c98fe8,#f2ce7c); box-shadow: 0 0 12px rgba(242,206,124,0.8); }
.tier-chip.locked{ background:#c3cad4; color:#7a828e; box-shadow:none; }

/* ---------- レア度演出(9段階) ---------- */
.tier-badge{
  position:absolute; top:-13px; left:50%; transform:translateX(-50%);
  color:#fff; font-weight:900; font-size: clamp(11px,1.3vw,13.5px);
  padding:5px 14px; border-radius:999px; white-space:nowrap;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.badge-uncommon{ background: var(--teal); }
.badge-rare{ background: linear-gradient(120deg,#f2ce7c,#e8b23d); }
.badge-doubleRare{ background: linear-gradient(120deg,#ff8fb0,#a98fd6,#7bd6c4); background-size:200% 100%; animation: rainbowShift 2.5s linear infinite; }
.badge-tripleRare{ background: linear-gradient(120deg,#7bd6c4,#4f9dd6); }
.badge-superRare{ background: linear-gradient(120deg,#f2ce7c,#f28fa3,#a98fd6); background-size:200% 100%; animation: rainbowShift 1.8s linear infinite; }
.badge-hyperRare{ background: linear-gradient(120deg,#7bd6c4,#f2ce7c,#ff8fb0); background-size:200% 100%; animation: rainbowShift 1.3s linear infinite; box-shadow: 0 0 14px rgba(242,206,124,0.7); }
.badge-ultraRare{ background: linear-gradient(120deg,#a98fd6,#4f9dd6,#7bd6c4,#f2ce7c); background-size:300% 100%; animation: rainbowShift 1s linear infinite; box-shadow: 0 0 18px rgba(169,143,214,0.8); font-size: clamp(12px,1.5vw,15px); }
.badge-hundred{ background: linear-gradient(120deg,#c98fe8,#f2ce7c,#ff8fb0,#7bd6c4); background-size:300% 100%; animation: rainbowShift 0.8s linear infinite; box-shadow: 0 0 22px rgba(242,206,124,0.9); font-size: clamp(13px,1.7vw,17px); padding:7px 18px; }
@keyframes rainbowShift{ 0%{background-position:0% 50%;} 100%{background-position:200% 50%;} }

.prompt-box.fx-uncommon{ border-color: var(--teal); }
.prompt-box.fx-rare{ border-color: var(--gold); box-shadow: 0 0 12px rgba(232,178,61,0.3); }
.prompt-box.fx-doubleRare{
  border: 3px solid transparent;
  background-image: linear-gradient(#fff,#fbf6e8), linear-gradient(120deg,#4f9dd6,#7bd6c4,#4f9dd6);
  background-size: 100% 100%, 300% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 1.4s linear infinite, cardPop 0.5s ease-out;
  box-shadow: 0 0 24px rgba(79,157,214,0.6);
}
.prompt-box.fx-tripleRare{
  border: 3px solid transparent;
  background-image: linear-gradient(#fff,#fbf6e8), linear-gradient(120deg,#ff8fb0,#a98fd6,#7bd6c4,#ff8fb0);
  background-size: 100% 100%, 300% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 1.1s linear infinite, cardPop 0.5s ease-out;
  box-shadow: 0 0 28px rgba(169,143,214,0.65);
}
.prompt-box.fx-superRare{
  border: 3px solid transparent;
  background-image: linear-gradient(#fff,#fbf6e8), linear-gradient(120deg,#f2ce7c,#f28fa3,#a98fd6,#7bd6c4,#f2ce7c);
  background-size: 100% 100%, 400% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 1.6s linear infinite, cardBurst 0.6s ease-out;
  box-shadow: 0 0 34px rgba(242,206,124,0.7);
}
.prompt-box.fx-hyperRare{
  border: 3px solid transparent;
  background-image: linear-gradient(#fff,#fbf6e8), linear-gradient(120deg,#7bd6c4,#f2ce7c,#ff8fb0,#a98fd6,#7bd6c4);
  background-size: 100% 100%, 400% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 1s linear infinite, cardBurst 0.6s ease-out;
  box-shadow: 0 0 40px rgba(242,206,124,0.8);
}
.prompt-box.fx-ultraRare{
  border: 4px solid transparent;
  background-image: linear-gradient(#fffdf5,#fdf0fb), linear-gradient(120deg,#a98fd6,#4f9dd6,#7bd6c4,#f2ce7c,#a98fd6);
  background-size: 100% 100%, 400% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 0.7s linear infinite, legendPulse 1.1s ease-in-out infinite, cardBurst 0.7s ease-out;
  box-shadow: 0 0 0 3px rgba(169,143,214,0.5), 0 0 46px rgba(169,143,214,0.85);
}
.prompt-box.fx-hundred{
  border: 4px solid transparent;
  background-image: linear-gradient(#fffdf5,#fdf0fb), linear-gradient(120deg,#c98fe8,#f2ce7c,#ff8fb0,#7bd6c4,#c98fe8);
  background-size: 100% 100%, 400% 100%;
  background-origin: border-box; background-clip: padding-box, border-box;
  animation: holoShift 0.6s linear infinite, legendPulse 0.9s ease-in-out infinite, cardBurst 0.8s ease-out;
  box-shadow: 0 0 0 4px rgba(242,206,124,0.65), 0 0 60px rgba(242,206,124,0.95);
}
@keyframes cardPop{ 0%{ transform: scale(0.85); opacity:0.3; } 100%{ transform: scale(1); opacity:1; } }
@keyframes cardBurst{ 0%{ transform: scale(0.7) rotate(-2deg); opacity:0; } 60%{ transform: scale(1.06) rotate(1deg); opacity:1; } 100%{ transform: scale(1) rotate(0deg); } }

/* じらす(チャージ)演出 */
.prompt-box.fx-charging{
  border: 3px dashed var(--gold);
  animation: chargeGlow 1.3s ease-in-out infinite;
}
.charge-icon{ font-size: clamp(60px,8vw,90px); animation: chargeShake 0.5s ease-in-out infinite; }
.charge-text{ margin-top:10px; color: var(--ink-soft); font-weight:700; }
@keyframes chargeGlow{
  0%,100%{ box-shadow: 0 0 10px rgba(232,178,61,0.3); }
  50%{ box-shadow: 0 0 40px rgba(232,178,61,0.85); }
}
@keyframes chargeShake{
  0%,100%{ transform: scale(1) rotate(0deg); }
  25%{ transform: scale(1.08) rotate(-4deg); }
  75%{ transform: scale(1.08) rotate(4deg); }
}

/* きらめきパーティクル */
.sparkle-layer{ position:absolute; inset:0; overflow:visible; pointer-events:none; }
.sparkle-particle{
  position:absolute; top:100%; opacity:0; pointer-events:none;
  animation-name: sparkleFloat; animation-timing-function: ease-out; animation-iteration-count: infinite;
}
@keyframes sparkleFloat{
  0%{ transform: translateY(0) scale(0.5) rotate(0deg); opacity:0; }
  15%{ opacity:1; }
  100%{ transform: translateY(-140px) scale(1.1) rotate(90deg); opacity:0; }
}
@keyframes holoShift{ 0%{background-position:0% 0%, 0% 50%;} 100%{background-position:0% 0%, 200% 50%;} }
@keyframes legendPulse{ 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.015); } }

.screen-flash{
  position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:999;
}
.screen-flash.go{ animation: flashFade 0.5s ease-out; }
@keyframes flashFade{ 0%{opacity:0.85;} 100%{opacity:0;} }

/* 図鑑マスのレア度グロー */
.cell.dex-rare-doubleRare{ box-shadow: 0 0 0 1px #4f9dd6, 0 0 6px rgba(79,157,214,0.6); }
.cell.dex-rare-tripleRare{ box-shadow: 0 0 0 1px #a98fd6, 0 0 8px rgba(169,143,214,0.7); }
.cell.dex-rare-superRare{ box-shadow: 0 0 0 2px #f28fa3, 0 0 9px rgba(242,143,163,0.75); }
.cell.dex-rare-hyperRare{ box-shadow: 0 0 0 2px #f2ce7c, 0 0 10px rgba(242,206,124,0.8); }
.cell.dex-rare-ultraRare{ box-shadow: 0 0 0 2px #a98fd6, 0 0 12px rgba(169,143,214,0.9); }
.cell.dex-rare-hundred{
  box-shadow: 0 0 0 2px #f2ce7c, 0 0 14px rgba(242,206,124,0.95);
  background-image: linear-gradient(120deg,#c98fe8,#f2ce7c,#ff8fb0,#7bd6c4) !important;
  background-size: 300% 100%; animation: rainbowShift 1.5s linear infinite;
}
</style>
</head>

<body>
<div id="app"></div>
<div class="screen-flash" id="screenFlash"></div>
<script>
/* ===================== クイズに出る元素 (全118種、3段階のレベル分け) ===================== */
const EASY_ELEMENTS = [
 {num:1, symbol:"H",  name:"水素",       yomi:"すいそ",       cat:"nonmetal", period:1, group:1,  emoji:"💧", tier:"common", clue:"みずをつくる なかまだよ", fact:"うちゅうで いちばん たくさんある げんそだよ"},
 {num:2, symbol:"He", name:"ヘリウム",   yomi:"へりうむ",     cat:"noble",    period:1, group:18, emoji:"🎈", tier:"common", clue:"ふうせんを ふわふわ うかせるよ", fact:"くうきより かるいから ふうせんが そらに あがるんだよ"},
 {num:3, symbol:"Li", name:"リチウム",   yomi:"りちうむ",     cat:"alkali",   period:2, group:1,  emoji:"🔋", tier:"common", clue:"でんちの なかにいるよ", fact:"スマホや ゲームきの でんちにも つかわれているよ"},
 {num:4, symbol:"Be", name:"ベリリウム", yomi:"べりりうむ",   cat:"alkaline", period:2, group:2,  emoji:"💎", tier:"uncommon", clue:"たからものみたいな かたい石にいるよ", fact:"かるくて じょうぶだから ロケットのぶひんにも つかわれるよ"},
 {num:5, symbol:"B",  name:"ホウ素",     yomi:"ほうそ",       cat:"metalloid",period:2, group:13, emoji:"🧴", tier:"uncommon", clue:"せっけんやガラスを つよくするよ", fact:"ガラスを わりにくくする ちからが あるよ"},
 {num:6, symbol:"C",  name:"炭素",       yomi:"たんそ",       cat:"nonmetal", period:2, group:14, emoji:"✏️", tier:"common", clue:"えんぴつのしんは これでできているよ", fact:"ダイヤモンドも たんその なかまで できているよ"},
 {num:7, symbol:"N",  name:"窒素",       yomi:"ちっそ",       cat:"nonmetal", period:2, group:15, emoji:"🌬️", tier:"common", clue:"くうきの中で いちばん おおい気体だよ", fact:"しょくぶつが そだつときの えいようにも なるよ"},
 {num:8, symbol:"O",  name:"酸素",       yomi:"さんそ",       cat:"nonmetal", period:2, group:16, emoji:"🫁", tier:"common", clue:"いきをすうときに つかう気体だよ", fact:"火が もえるときにも ひつような 気体だよ"},
 {num:9, symbol:"F",  name:"フッ素",     yomi:"ふっそ",       cat:"halogen",  period:2, group:17, emoji:"🦷", tier:"common", clue:"はみがきこに入っていて 歯をまもるよ", fact:"むし歯を ふせぐ ちからが あるよ"},

function makeSparkles(n){
  const chars = ["✨","⭐","💫"];
  let html = "";
  for(let i=0;i<n;i++){
    const ch = chars[Math.floor(Math.random()*chars.length)];
    const left = Math.floor(Math.random()*90)+5;
    const delay = (Math.random()*1.2).toFixed(2);
    const dur = (1.4+Math.random()*1.2).toFixed(2);
    const size = 12+Math.floor(Math.random()*14);
    html += `<span class="sparkle-particle" style="left:${left}%; font-size:${size}px; animation-delay:${delay}s; animation-duration:${dur}s;">${ch}</span>`;
  }
  return html;
}

const HALOGENS=["F","Cl","Br","I","At","Ts"];
const NOBLES=["He","Ne","Ar","Kr","Xe","Rn","Og"];
const ALKALIS=["Li","Na","K","Rb","Cs","Fr"];
const ALKALINES=["Be","Mg","Ca","Sr","Ba","Ra"];
const POST_TRANS=["Al","Ga","In","Sn","Tl","Pb","Bi","Nh","Fl","Mc","Lv"];
function computeCategory(symbol, period, group){
  if(METALLOIDS.includes(symbol)) return "metalloid";
  if(NONMETALS.includes(symbol)) return "nonmetal";
  if(HALOGENS.includes(symbol)) return "halogen";
  if(NOBLES.includes(symbol)) return "noble";
  if(ALKALIS.includes(symbol)) return "alkali";
  if(ALKALINES.includes(symbol)) return "alkaline";
  if(period===9) return "lanthanide";
  if(period===10) return "actinide";
  if(group>=3 && group<=12) return "transition";
  if(POST_TRANS.includes(symbol)) return "other";
  return "other";
}
const DEX_ALL = FULL_TABLE.map(([period,group,symbol])=>{
  const known = BY_SYMBOL[symbol];
  return {
    symbol, period, group,
    quizzable: !!known,
    cat: known ? known.cat : computeCategory(symbol, period, group)
  };
});

const SAVE_KEY = "genso-lab-save";
let save = { unlocked:{}, bestStreak:0, compoundsFound:{} };

// claude.aiのアーティファクト内では window.storage を、
// 外部サイト(GitHub Pagesなど)にホスティングした場合は localStorage を使う
const hasArtifactStorage = (typeof window!=="undefined" && !!window.storage);
async function storageGet(key){
  if(hasArtifactStorage){
    try{ return await window.storage.get(key,false); }catch(e){ return null; }
  }
  try{
    const v = localStorage.getItem(key);
    return v!==null ? {value:v} : null;
  }catch(e){ return null; }
}
async function storageSet(key,value){
  if(hasArtifactStorage){
    try{ return await window.storage.set(key,value,false); }catch(e){ return null; }
  }
  try{ localStorage.setItem(key,value); return {value}; }catch(e){ return null; }
}

async function loadSave(){
  try{ const r = await storageGet(SAVE_KEY); if(r&&r.value) save = JSON.parse(r.value); }
  catch(e){ /* 初回 */ }
  if(!save.compoundsFound) save.compoundsFound = {};
}
function compoundFoundCount(){ return Object.keys(save.compoundsFound).filter(k=>save.compoundsFound[k]).length; }
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    await storageSet(SAVE_KEY, JSON.stringify(save));
  },300);
}
function unlockedCount(){ return Object.keys(save.unlocked).filter(k=>save.unlocked[k]).length; }

function pickWeighted(list){
  let total = 0;
  const weighted = list.map(e=>{ const w = TIER_WEIGHT[e.tier] || 1; total += w; return {e, w}; });
  let r = Math.random() * total;
  for(const item of weighted){
    r -= item.w;
    if(r <= 0) return item.e;
  }
  return weighted[weighted.length-1].e;
}

function pickTargetElement(){
  const availableTiers = TIER_ORDER.filter(t=>isTierUnlocked(t));
  const pool = ELEMENTS.filter(e=>availableTiers.includes(e.tier));
  let remaining = pool.filter(e=>!save.unlocked[e.symbol]);
  if(remaining.length===0){
    const revPool = ELEMENTS.filter(e=>!lastAsked.includes(e.symbol));
    const src = revPool.length ? revPool : ELEMENTS;
    return pickWeighted(src);
  }
  const notRecent = remaining.filter(e=>!lastAsked.includes(e.symbol));
  return pickWeighted(notRecent.length ? notRecent : remaining);
}

function shuffledDistractors(correctSymbol, n, tier){
  let pool = ELEMENTS.filter(e=>e.symbol!==correctSymbol && e.tier===tier);
  if(pool.length < n){
    pool = ELEMENTS.filter(e=>e.symbol!==correctSymbol);
  }
  pool = pool.slice();
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool.slice(0,n);
}

function newQuestion(){
  cur = pickTargetElement();
  lastAsked.push(cur.symbol);
  if(lastAsked.length>3) lastAsked.shift();
  const distractors = shuffledDistractors(cur.symbol, 3, cur.tier);
  curChoices = [cur, ...distractors];
  for(let i=curChoices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [curChoices[i],curChoices[j]]=[curChoices[j],curChoices[i]]; }
  answered = false;
  pickedSymbol = null;
  const fx = TIER_FX[cur.tier] || TIER_FX.common;

  if(fx.tease){
    teasing = true;
    render();
    setTimeout(()=>{
      teasing = false;
      render();
      flashScreen();
    }, 1300);
  } else {
    teasing = false;
    render();
    flashScreen();
  }

  function flashScreen(){
    if(!fx.flash) return;
    const el = document.getElementById("screenFlash");
    if(el){ el.classList.remove("go"); void el.offsetWidth; el.classList.add("go"); }
  }
}

function answerQuiz(symbol){
  if(answered) return;
  answered = true;
  pickedSymbol = symbol;
  const correct = symbol === cur.symbol;
  if(correct){
    streak++;
    save.bestStreak = Math.max(save.bestStreak, streak);
    save.unlocked[cur.symbol] = true;
    persist();
  } else {
    streak = 0;
  }
  render();
}

function pickTargetCompound(){
  let remaining = COMPOUNDS.filter(c=>!save.compoundsFound[c.id]);
  if(remaining.length===0){
    const pool = COMPOUNDS.filter(c=>!lastAskedCompound.includes(c.id));
    const src = pool.length ? pool : COMPOUNDS;
    return src[Math.floor(Math.random()*src.length)];
  }
  const notRecent = remaining.filter(c=>!lastAskedCompound.includes(c.id));
  return (notRecent.length ? notRecent : remaining)[0];
}

function newCompoundQuestion(){
  curCompound = pickTargetCompound();
  lastAskedCompound.push(curCompound.id);
  if(lastAskedCompound.length>3) lastAskedCompound.shift();
  const distractorPool = COMPOUNDS.filter(c=>c.id!==curCompound.id).slice();
  for(let i=distractorPool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [distractorPool[i],distractorPool[j]]=[distractorPool[j],distractorPool[i]]; }
  curComboChoices = [curCompound, ...distractorPool.slice(0,3)];
  for(let i=curComboChoices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [curComboChoices[i],curComboChoices[j]]=[curComboChoices[j],curComboChoices[i]]; }
  comboAnswered = false;
  comboPicked = null;
  render();
}

function answerCompoundQuiz(id){
  if(comboAnswered) return;
  comboAnswered = true;
  comboPicked = id;
  const correct = id === curCompound.id;
  if(correct){
    comboStreak++;
    save.compoundsFound[curCompound.id] = true;
    persist();
  } else {
    comboStreak = 0;
  }
  render();
}

        ${answered ? `<button class="btn-primary" id="nextQ">つぎのもんだいへ →</button>` : ""}
        <button class="btn-ghost" id="toTitle2">タイトル / 図鑑にもどる</button>
      </div>
    `;
    document.querySelectorAll(".choice-btn").forEach(b=>{
      b.onclick = ()=>{ if(!answered) answerQuiz(b.dataset.symbol); };
    });
    const nextBtn = document.getElementById("nextQ");
    if(nextBtn) nextBtn.onclick = ()=> newQuestion();
    document.getElementById("toTitle2").onclick = ()=>{ state="title"; render(); };
    return;
  }

  if(state==="quizCombo"){
    const ea = BY_SYMBOL[curCompound.a];
    const eb = BY_SYMBOL[curCompound.b];
    const promptHtml = `
      <div class="combo-row">
        <div class="combo-chip"><span class="ce">${ea.emoji}</span><span class="cs">${ea.symbol}</span><span class="cn">${ea.name}(${ea.yomi})</span></div>
        <span class="combo-op">+</span>
        <div class="combo-chip"><span class="ce">${eb.emoji}</span><span class="cs">${eb.symbol}</span><span class="cn">${eb.name}(${eb.yomi})</span></div>
        <span class="combo-op">=</span>
        <div class="combo-chip"><span class="ce">${comboAnswered ? "✨" : "❓"}</span><span class="cs">?</span></div>
      </div>
      <div class="prompt-clue" style="margin-top:10px;font-size:12px;color:var(--ink-soft);">くっつけると何になる？</div>
    `;
    const choicesHtml = curComboChoices.map(c=>{
      let cls = "choice-btn";
      if(comboAnswered){
        if(c.id===curCompound.id) cls += " correct";
        else if(c.id===comboPicked) cls += " wrong";
      }
      return `<button class="${cls}" data-id="${c.id}" ${comboAnswered?"disabled":""}>
        <span class="cname" style="font-size:15px;color:var(--ink);">${c.result}</span>
        <span class="cname">${c.yomi}</span>
      </button>`;
    }).join("");

    const wasCorrect = comboAnswered && comboPicked===curCompound.id;
    const factBoxHtml = comboAnswered ? `
      <div class="fact-reveal show ${wasCorrect?'':'wrongbox'}">
        <b>${wasCorrect ? "せいかい!" : "おしい!"} ${curCompound.result}(${curCompound.yomi}) <span style="font-weight:400;">${curCompound.note}</span></b><br>${curCompound.fact}
      </div>` : `<div class="fact-reveal"></div>`;

    app.innerHTML = `
      <div class="card">
        <div class="quiz-top">
          <span>🧪 くっつけると何になる？</span>
          <span class="streak">${comboStreak>0 ? comboStreak+"問 連続正解中!" : ""}</span>
        </div>
        <div class="prompt-box">${promptHtml}</div>
        <div class="choices">${choicesHtml}</div>
        ${factBoxHtml}
        ${comboAnswered ? `<button class="btn-primary" id="nextCombo">つぎのもんだいへ →</button>` : ""}
        <button class="btn-ghost" id="toTitle3">タイトルにもどる</button>
      </div>
    `;
    document.querySelectorAll(".choice-btn").forEach(b=>{
      b.onclick = ()=>{ if(!comboAnswered) answerCompoundQuiz(b.dataset.id); };
    });
    const nextComboBtn = document.getElementById("nextCombo");
    if(nextComboBtn) nextComboBtn.onclick = ()=> newCompoundQuestion();
    document.getElementById("toTitle3").onclick = ()=>{ state="title"; render(); };
    return;
  }
}

(async ()=>{
  await loadSave();
  state = "title";
  render();
})();
</script>
</body>
</html>
